<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌾</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AgriSmart — AI-powered agriculture management platform for farmers and cooperatives in Uttarakhand. Weather intelligence, crop analysis, and farming guidance in Hindi and English." />
    <meta name="theme-color" content="#2E7D32" />
    <title>AgriSmart — AI Smart Agriculture Platform</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('agrismart-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = stored ? stored === 'dark' : prefersDark;
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {
          /* localStorage unavailable — default to light theme */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
